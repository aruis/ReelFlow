name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_FILE: ReelFlow.xcodeproj
  SCHEME_NAME: ReelFlow
  DERIVED_DATA_PATH: .derivedData
  XCODE_VERSION: latest-stable

jobs:
  core-tests:
    name: Core Tests
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-deriveddata-non-ui-${{ hashFiles('ReelFlow.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-non-ui-

      - name: Run maintainability checks
        run: ./scripts/check-maintainability.sh

      - name: Run core tests
        run: ./scripts/test-non-ui.sh

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: core-tests-xcresult
          path: ${{ env.DERIVED_DATA_PATH }}/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 7

  ui-smoke:
    name: UI Smoke
    needs: core-tests
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v5
        with:
          path: ${{ env.DERIVED_DATA_PATH }}
          key: ${{ runner.os }}-deriveddata-ui-smoke-${{ hashFiles('ReelFlow.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-ui-smoke-

      - name: Run UI smoke
        run: ./scripts/test-ui-smoke.sh

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ui-smoke-xcresult
          path: ${{ env.DERIVED_DATA_PATH }}/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
